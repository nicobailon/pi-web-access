spec:
  name: gemma-summarize-speed
  description: "Optimize Gemma 4 E2B UD-Q4 summarization speed while maintaining accuracy and intelligence for pi-web-access search results"
  goal: >
    Reduce the latency of LLM-generated web search summaries using the local
    Gemma 4 E2B UD-Q4 model (port 8082) without sacrificing factual accuracy,
    completeness, or readability.
  metric:
    primary:
      name: tps
      type: hard
      direction: maximize
      target: 37
    degenerate_gates:
      - metric: summary_length_chars
        operator: ">="
        threshold: 100
      - metric: summary_length_chars
        operator: "<="
        threshold: 3000
      - metric: has_sources_section
        operator: "=="
        threshold: true
    diagnostics:
      - latency_ms
      - tokens_generated
      - tps
      - prompt_tokens
  scope:
    mutable:
      - local-llm-api.ts
      - summary-review.ts
    immutable:
      - firecrawl-config.ts
      - firecrawl-fetch.ts
      - firecrawl-search.ts
  execution:
    mode: serial
    max_concurrent: 1
  stopping:
    max_iterations: 8
    max_hours: 2
    plateau_iterations: 3

